# Server Configuration
server.port=${SERVER_PORT:8080}

# SCOP Configuration
config=src/main/resources/config.json

# Logging
logging.level.hotel.reservation=${LOG_LEVEL:INFO}
logging.level.ai.scop=WARN
logging.level.ai.scop.core.Playground=WARN
logging.level.org.springframework=WARN
logging.level.org.apache=WARN

# Log pattern (daha temiz)
logging.pattern.console=%d{HH:mm:ss} [%highlight(%-5level)] %msg%n

# Jackson JSON
spring.jackson.serialization.indent-output=true

# Weather API - loaded from .env file
weather.api.key=${OPENWEATHER_API_KEY:}
